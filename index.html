<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ad Watch Earning</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Ad Watch Earning</h1>
  <p>Total Ads Available: <span id="totalAds">5000</span></p>
  <p>Ads Watched: <span id="watched">0</span></p>
  <p>Your Balance: Rs <span id="balance">0</span></p>

  <div class="ad-box">
      <p id="adText">Click Start to watch ads</p>
      <p>Time Left: <span id="timer">15</span>s</p>
  </div>

  <button onclick="startAd()">Start Watching Ad</button>
</div>

<script src="script.js"></script>
</body>
</html>
